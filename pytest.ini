[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    # Prevent unrelated third-party pytest plugins (installed globally) from
    # breaking test collection. This repo does not require auto-loaded plugins.
    # NOTE: Pytest 7.x doesn't support a CLI flag for this; we enforce via
    # `sitecustomize.py` (see repo root) which sets PYTEST_DISABLE_PLUGIN_AUTOLOAD
    # when running pytest.

# Markers
markers =
    unit: Unit tests (pure logic, no real external boundaries)
    integration: Integration tests
    e2e: End-to-end smoke tests for critical flows
    vectordb: Vector database tests
    iplan: iPlan data tests
    data_contracts: Range & completeness / contract tests (high-signal)
    db: Tests that touch a real database/persistence boundary
    ui: Tests that execute UI scripts (Streamlit smoke)
    network: Tests that require real network access (should be rare/skipped in CI)
    slow: Slow running tests

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.10

# Console output
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO
