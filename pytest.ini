[pytest]
minversion = 8.0
testpaths = tests
addopts = --strict-markers
markers =
    unit: mark test as unit test
    integration: mark test as integration test
    e2e: mark test as end-to-end test
    data_contracts: mark test as a data contract/range/completeness check
    vectordb: mark test as vector database test
    iplan: mark test as iPlan data test
    db: mark test as touching a DB/persistence boundary
    ui: mark test as executing UI scripts
    network: mark test as requiring real network access
    slow: mark test as slow running
