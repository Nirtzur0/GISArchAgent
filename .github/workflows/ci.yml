name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (expanded lint + debt-burn format)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies + quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install ruff black

      - name: Expanded lint gate (CMD-021)
        run: ruff check . --select E9,F63,F7 --exclude project-prompts

      - name: Format guard on maintained surfaces (CMD-022)
        run: |
          black --check \
            src/telemetry.py \
            src/observability/query.py \
            src/application/__init__.py \
            src/application/dtos.py \
            src/data_management/__init__.py \
            src/data_management/data_store.py \
            src/data_management/fetchers.py \
            src/data_management/pydoll_fetcher.py \
            src/application/services/building_rights_service.py \
            src/application/services/plan_upload_service.py \
            src/application/services/regulation_query_service.py \
            src/application/services/plan_search_service.py \
            src/infrastructure/__init__.py \
            src/infrastructure/factory.py \
            src/infrastructure/repositories/chroma_repository.py \
            src/infrastructure/repositories/iplan_repository.py \
            src/infrastructure/services/cache_service.py \
            src/infrastructure/services/document_service.py \
            src/infrastructure/services/llm_service.py \
            src/infrastructure/services/vision_service.py \
            src/vectorstore/unified_pipeline.py \
            src/domain/__init__.py \
            src/domain/entities/__init__.py \
            src/domain/entities/analysis.py \
            src/domain/entities/plan.py \
            src/domain/entities/regulation.py \
            src/domain/repositories/__init__.py \
            src/domain/value_objects/__init__.py \
            src/domain/value_objects/building_rights.py \
            src/domain/value_objects/geometry.py \
            tests/unit/infrastructure/test_telemetry_backend.py \
            tests/unit/infrastructure/test_observability_query.py \
            tests/unit/application/test_external_dependency_degraded_modes.py \
            tests/unit/infrastructure/test_iplan_repository_error_signal.py \
            scripts/observability_cli.py \
            scripts/check_release_semantics.py

      - name: Format guard on changed Python files (CMD-030)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base_sha=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            base_sha="${PUSH_BASE_SHA}"
          fi

          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA is unavailable; CMD-022 maintained-surface guard already ran."
            exit 0
          fi

          changed_count="$(python3 scripts/quality_changed_python.py --base "${base_sha}" --head "${HEAD_SHA}" --exclude-file scripts/quality_black_debt_allowlist.txt --count)"
          if [ "${changed_count}" = "0" ]; then
            echo "No changed non-allowlisted Python files detected."
            exit 0
          fi

          echo "Changed Python files between ${base_sha} and ${HEAD_SHA}:"
          python3 scripts/quality_changed_python.py --base "${base_sha}" --head "${HEAD_SHA}" --exclude-file scripts/quality_black_debt_allowlist.txt

          python3 scripts/quality_changed_python.py --base "${base_sha}" --head "${HEAD_SHA}" --exclude-file scripts/quality_black_debt_allowlist.txt --print0 \
            | xargs -0 -r black --check

      - name: Dependency lock/docs drift check (CMD-033)
        run: |
          python3 scripts/check_dependency_sync.py \
            --requirements requirements.txt \
            --dev-requirements requirements-dev.txt \
            --lock requirements.lock \
            --doc docs/reference/dependencies.md

  tests:
    name: Tests (unit/integration/e2e/contracts)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit suite (CMD-004)
        run: python -m pytest -m unit

      - name: Integration suite (CMD-005)
        run: python -m pytest -m integration

      - name: E2E smoke suite (CMD-006)
        run: python -m pytest -m e2e

      - name: Data contract suite (CMD-007)
        run: python -m pytest -m data_contracts

  prompt-pack-integrity:
    name: Prompt Pack Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate prompt manifests
        run: python3 project-prompts/scripts/prompts_manifest.py --check

      - name: Validate prompt system integrity
        run: python3 project-prompts/scripts/system_integrity.py --mode prompt_pack --root project-prompts
